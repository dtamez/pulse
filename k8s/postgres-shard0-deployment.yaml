apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-postgres-shard0
  namespace: pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-postgres-shard0
  template:
    metadata:
      labels:
        app: pulse-postgres-shard0
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: pulse-secrets
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          emptyDir: {}
env:
  - name: POSTGRES_DB
    value: pulse
  - name: POSTGRES_USER
    value: postgres
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: pulse-secrets
        key: POSTGRES_PASSWORD
