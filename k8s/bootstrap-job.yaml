apiVersion: batch/v1
kind: Job
metadata:
  name: pulse-bootstrap
  namespace: pulse
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: pulse-app:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/bootstrap.py"]
          envFrom:
            - configMapRef:
                name: pulse-config
            - secretRef:
                name: pulse-secrets
