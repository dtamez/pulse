version: "3.9"

services:

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 
    ports:
      - "8000:8000"
    environment:
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pulse
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/pulse
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app 
    depends_on:
      - postgres
      - redis 

  worker:
    build: .
    command: celery -A worker.app.celery_app worker -l info 
    environment:
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pulse
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/pulse
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app 
    depends_on:
      - postgres
      - redis 

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
