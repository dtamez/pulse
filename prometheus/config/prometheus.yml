global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  - job_name: "prometheus"

    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "pulse-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "postgres"
    static_configs:
      - targets:
          - "postgres-exporter-shard0:9187"
          - "postgres-exporter-shard1:9187"

  - job_name: 'celery'
    static_configs:
      - targets: ['celery-exporter:9808']
